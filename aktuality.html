<style>
  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.45em;
    color: var(--gold);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 0.6rem;
  }
  .section-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.6rem, 3.5vw, 2.6rem);
    color: var(--cream);
    text-align: center;
    margin-bottom: 0.5rem;
  }
  .aktuality-page {
    background: var(--dark);
    padding: 4rem 2rem 5rem;
    border-top: 1px solid rgba(201,146,42,0.12);
  }
  .aktuality-page-inner {
    max-width: 1100px;
    margin: 0 auto;
    text-align: center;
  }
  /* Karty aktualit */
  .aktuality-karta-odkaz {
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .aktuality-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2rem;
    margin-top: 3rem;
    text-align: left;
  }
  .aktuality-karta {
    background: var(--dark-mid);
    border: 1px solid rgba(201,146,42,0.15);
    overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
    height: 100%;
  }
  .aktuality-karta:hover {
    border-color: rgba(201,146,42,0.4);
    transform: translateY(-3px);
  }
  .aktuality-karta-img {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    display: block;
  }
  .aktuality-karta-body {
    padding: 1.4rem 1.5rem;
  }
  .aktuality-karta-meta {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .aktuality-karta-title {
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    color: var(--cream);
    line-height: 1.4;
    margin-bottom: 0.6rem;
  }
  .aktuality-karta-perex {
    font-size: 0.95rem;
    line-height: 1.65;
    color: rgba(249,243,227,0.6);
  }
  .nacitani {
    color: rgba(255,255,255,0.3);
    text-align: center;
    padding: 3rem 0;
    font-size: 0.9rem;
  }

<!-- OBSAH -->
<section class="aktuality-page" style="padding-top:6rem;">
  <div class="aktuality-page-inner">
    <p class="section-label">Farní život</p>
    <h1 class="section-title">Aktuality</h1>
    <div class="ornament">
      <span class="ornament-line"></span>
      <span class="ornament-cross">✦</span>
      <span class="ornament-line rev"></span>
    </div>

    <div class="aktuality-grid" id="aktuality-grid">
      <p class="nacitani" style="grid-column:1/-1;">Načítání&hellip;</p>
    </div>

    <div style="text-align:right;margin-top:2.5rem;">
      <a href="index.html" style="font-family:'Cinzel',serif;font-size:0.78rem;letter-spacing:0.2em;color:var(--gold-light);text-decoration:none;border-bottom:1px solid rgba(201,146,42,0.35);">

      </a>
    </div>
  </div>
</section>

<div id="site-footer"></div>
<script src="footer.js"></script>

<script>
(function () {
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  fetch('aktuality/aktuality.json')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var grid = document.getElementById('aktuality-grid');
      if (!Array.isArray(data) || data.length === 0) {
        grid.innerHTML = '<p class="nacitani" style="grid-column:1/-1;">Momentálně nejsou k\u00a0dispozici žádné aktuality.</p>';
        return;
      }
      var html = '';
      data.forEach(function (a) {
        html += '<a href="' + esc(a.soubor) + '" class="aktuality-karta-odkaz">';
        html += '<div class="aktuality-karta">';
        html += '<img src="' + esc(a.hero_img) + '" alt="' + esc(a.hero_alt) + '" class="aktuality-karta-img" loading="lazy">';
        html += '<div class="aktuality-karta-body">';
        html += '<p class="aktuality-karta-meta">' + esc(a.kategorie) + ' · ' + esc(a.datum) + '</p>';
        html += '<h2 class="aktuality-karta-title">' + esc(a.nazev) + '</h2>';
        html += '<p class="aktuality-karta-perex">' + esc(a.perex) + '</p>';
        html += '</div></div></a>';
      });
      grid.innerHTML = html;
    })
    .catch(function () {
      document.getElementById('aktuality-grid').innerHTML =
        '<p class="nacitani" style="grid-column:1/-1;">Aktuality se nepodařilo načíst.</p>';
    });
}());
</script>
</body>
