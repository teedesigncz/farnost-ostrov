<!-- OBSAH -->
<section class="ohlasy" style="padding-top:6rem;">
  <div class="ohlasy-inner">
    <p class="section-label">Farní život</p>
    <h1 class="section-title">Archiv ohlášek</h1>
    <div class="ornament">
      <span class="ornament-line"></span>
      <span class="ornament-cross">✦</span>
      <span class="ornament-line rev"></span>
    </div>
    <div class="ohlasy-content">
      <div class="ohlaska-list" id="archiv-list">
        <p style="color:rgba(255,255,255,0.3);text-align:center;padding:2rem 0;font-size:0.9rem;">Načítání&hellip;</p>
      </div>

      <div style="text-align:right;margin-top:2.5rem;">
        <a href="index.html#ohlasky" style="font-family:'Cinzel',serif;font-size:0.78rem;letter-spacing:0.2em;color:var(--gold-light);text-decoration:none;border-bottom:1px solid rgba(201,146,42,0.35);">
          &larr; Zpět na aktuální ohlášky
        </a>
      </div>
    </div>
    <script>
    (function () {
      function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }
      fetch('ohlasky/ohlasky-archiv.json')
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var list = document.getElementById('archiv-list');
          if (!Array.isArray(data) || data.length === 0) {
            list.innerHTML = '<p style="color:rgba(255,255,255,0.3);text-align:center;padding:2rem 0;font-size:0.9rem;">Archiv je prázdný.</p>';
            return;
          }
          var html = '';
          data.forEach(function (o) {
            var href = 'ohlasky/' + encodeURIComponent(o.soubor);
            html += '<div class="ohlaska-item">';
            html += '<div class="ohlaska-datum">' + esc(o.datum1) + (o.datum2 ? '<br>' + esc(o.datum2) : '') + '</div>';
            html += '<div class="ohlaska-text">';
            html += '<strong>' + esc(o.nazev) + '</strong>';
            html += '<a href="' + href + '" target="_blank" style="color:var(--gold-light);text-decoration:none;border-bottom:1px solid rgba(201,146,42,0.4);">Zobrazit ohlášky (.pdf) &rarr;</a>';
            html += '</div></div>';
          });
          list.innerHTML = html;
        })
        .catch(function () {
          document.getElementById('archiv-list').innerHTML = '<p style="color:rgba(255,255,255,0.3);text-align:center;padding:2rem 0;">Archiv se nepodařilo načíst.</p>';
        });
    }());
    </script>
  </div>
</section>
